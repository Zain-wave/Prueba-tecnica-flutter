name: splitly
description: "Split shared expenses fairly among a fixed group of friends."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  go_router: ^17.3.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

# ── Launcher icons ─────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFD43A"
  adaptive_icon_foreground: "assets/branding/icon_fg.png"
  web:
    generate: true
    image_path: "assets/branding/icon.png"
    background_color: "#FFD43A"
    theme_color: "#FFD43A"
  windows:
    generate: true
    image_path: "assets/branding/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/branding/icon.png"

# ── Native splash (before Flutter engine boots) ───────────────
flutter_native_splash:
  color: "#FFD43A"
  image: assets/branding/splash_image.png
  color_dark: "#FFD43A"
  image_dark: assets/branding/splash_image.png
  android_12:
    color: "#FFD43A"
    image: assets/branding/splash_image.png
    color_dark: "#FFD43A"
    image_dark: assets/branding/splash_image.png
  web: true
  ios: true
  android: true
